services:
  # Forum 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./data:/data  # 持久化SQLite数据库
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Forum 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - INTERNAL_API_URL=http://backend:8000
        - NEXT_PUBLIC_API_URL=
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Keep browser requests same-origin and proxy /api via Next.js
      - NEXT_PUBLIC_API_URL=
      - INTERNAL_API_URL=http://backend:8000

networks:
  default:
    driver: bridge
